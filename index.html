<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Name Picker</title>
        <script defer="true" src="main.js"></script>
        <link rel = "stylesheet" href = "style.css">
    </head>
<body>
    <div>
        <div class = "names">
            <textarea id="textbox" name="textbox" placeholder="Enter a list of names separated by a comma"></textarea>
        </div>
    
        <div class = "buttonContainer">
            <button id="butt" name="butt">START</button>
        </div>
    
        <div class = "inputs">
            <div class = "inputsChild">
                <label for="interval">Interval:</label>
                <input type="number" id="interval" name="interval" min="1"> seconds</input>
                <br><br>
                <label for="repeat">Repeat:</label>
                <input type="number" id ="repeat" name="repeat" min="1"> times</input>
            </div>
        </div>
    
        <div class = "display">
            <div class = "namediv">
                <b id = "name"></b>
            </div>
            <div class = "numberdiv">
                <b id = "number"></b>
            </div>
        </div>
    </div>
</body>
</html>
